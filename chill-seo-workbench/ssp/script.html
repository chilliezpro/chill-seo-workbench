<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Script Generator — SSP Content Engine</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface-2: #21253a;
      --border: #2a2d3a; --accent: #6c63ff; --accent-hover: #857dff;
      --text-primary: #f0f0f5; --text-secondary: #8b8fa8;
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
      --radius: 10px; --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body { padding-bottom: 60px; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-inner">
        <div>
          <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            SSP Content Engine
          </a>
          <div class="page-title" style="margin-top:6px;">Video Script Generator</div>
          <div class="page-subtitle">Short-form (60–90 sec) or long-form (2–3 min) from any client page.</div>
        </div>
      </div>
    </div>

    <!-- API Warning -->
    <div class="api-warning" id="apiWarning" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      No Groq API key found. <a href="index.html" style="color:var(--danger); text-decoration:underline;">Add your key in the portal</a> before generating.
    </div>

    <!-- Source Input -->
    <div class="card source-block" style="margin-bottom:16px;">
      <div class="section-heading">Content Source</div>

      <div class="source-row" id="urlRow">
        <input type="url" id="sourceUrl" class="input-field" placeholder="https://client-website.com/service-page" />
        <button class="btn-ghost" id="fetchBtn">
          <span class="spinner" id="fetchSpinner" style="display:none;"></span>
          Fetch Page
        </button>
      </div>

      <div class="source-status" id="sourceStatus">Enter a URL or paste content below.</div>

      <button class="source-toggle" id="pasteToggle">Or paste content manually ▾</button>

      <div id="pasteArea" style="display:none; margin-top:10px;">
        <textarea id="manualContent" class="textarea-field" rows="6" placeholder="Paste page content, service description, or any copy you want to turn into a script..."></textarea>
      </div>

      <div class="two-col" style="margin-top:14px;">
        <div class="field-group">
          <label class="field-label" for="bizType">Business Type</label>
          <select id="bizType" class="select-field">
            <option value="Auto-detect">Auto-detect</option>
            <option value="Law Firm">Law Firm</option>
            <option value="Home Services">Home Services</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Real Estate">Real Estate</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label" for="tone">Tone</label>
          <select id="tone" class="select-field">
            <option value="Auto-detect">Auto-detect</option>
            <option value="Professional">Professional</option>
            <option value="Friendly">Friendly</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Script Type Tabs -->
    <div class="card" style="margin-bottom:16px;">
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabShort" data-tab="short">Short-form (60–90 sec)</button>
        <button class="mode-tab" id="tabLong" data-tab="long">Long-form (2–3 min)</button>
      </div>

      <!-- Short Tab Prefs -->
      <div id="shortPrefs">
        <div class="pref-panel" style="border-top:none; padding-top:0;">
          <button class="pref-toggle" id="prefToggleShort">Script Preferences ▾</button>
          <div class="pref-content hidden" id="prefContentShort">
            <div class="field-group">
              <label class="field-label">Script Length</label>
              <select id="shortLength" class="select-field">
                <option value="60 seconds">60 sec</option>
                <option value="75 seconds" selected>75 sec</option>
                <option value="90 seconds">90 sec</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Hook Style</label>
              <select id="shortHook" class="select-field">
                <option value="Question">Question</option>
                <option value="Shocking fact">Shocking fact</option>
                <option value="Problem statement" selected>Problem statement</option>
                <option value="Bold claim">Bold claim</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Include B-Roll Notes</label>
              <select id="shortBroll" class="select-field">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Include Subtitle/Caption Cues</label>
              <select id="shortSubs" class="select-field">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Long Tab Prefs -->
      <div id="longPrefs" style="display:none;">
        <div class="pref-panel" style="border-top:none; padding-top:0;">
          <button class="pref-toggle" id="prefToggleLong">Script Preferences ▾</button>
          <div class="pref-content hidden" id="prefContentLong">
            <div class="field-group">
              <label class="field-label">Script Length</label>
              <select id="longLength" class="select-field">
                <option value="2 minutes">2 min</option>
                <option value="2.5 minutes" selected>2.5 min</option>
                <option value="3 minutes">3 min</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Hook Style</label>
              <select id="longHook" class="select-field">
                <option value="Question">Question</option>
                <option value="Shocking fact">Shocking fact</option>
                <option value="Problem statement" selected>Problem statement</option>
                <option value="Bold claim">Bold claim</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Include B-Roll Notes</label>
              <select id="longBroll" class="select-field">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Include Subtitle/Caption Cues</label>
              <select id="longSubs" class="select-field">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top:20px;">
        <button class="btn-primary" id="generateBtn">
          <span class="spinner" id="genSpinner" style="display:none;"></span>
          Generate Script
        </button>
      </div>
    </div>

    <!-- Output -->
    <div>
      <div class="output-block">
        <div class="output-placeholder" id="outputPlaceholder">Output will appear here.</div>
        <button class="copy-btn" id="copyBtn" style="display:none;">Copy</button>
        <div class="output-text" id="outputText" style="display:none;"></div>
      </div>
      <div class="feedback-row" id="feedbackRow" style="display:none;">
        <span class="feedback-label">Was this helpful?</span>
        <button class="feedback-btn feedback-up">👍</button>
        <button class="feedback-btn feedback-down">👎</button>
        <div class="feedback-detail">
          <textarea class="textarea-field feedback-textarea" rows="2" placeholder="What was wrong?"></textarea>
          <button class="btn-ghost btn-sm feedback-send">Send feedback</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/shared.js"></script>
  <script>
    const GROQ_KEY = 'ssp_groq_key';
    requireApiKey(GROQ_KEY, 'apiWarning');

    var pageText    = '';
    var activeTab   = 'short';

    /* ── Tabs ── */
    document.querySelectorAll('.mode-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.mode-tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        activeTab = this.dataset.tab;
        document.getElementById('shortPrefs').style.display = activeTab === 'short' ? 'block' : 'none';
        document.getElementById('longPrefs').style.display  = activeTab === 'long'  ? 'block' : 'none';
      });
    });

    /* ── Pref Toggles ── */
    function bindPrefToggle(btnId, contentId) {
      document.getElementById(btnId).addEventListener('click', function() {
        var c = document.getElementById(contentId);
        c.classList.toggle('hidden');
        this.textContent = c.classList.contains('hidden') ? 'Script Preferences ▾' : 'Script Preferences ▴';
      });
    }
    bindPrefToggle('prefToggleShort', 'prefContentShort');
    bindPrefToggle('prefToggleLong',  'prefContentLong');

    /* ── Paste Toggle ── */
    var pasteVisible = false;
    document.getElementById('pasteToggle').addEventListener('click', function() {
      pasteVisible = !pasteVisible;
      document.getElementById('pasteArea').style.display = pasteVisible ? 'block' : 'none';
      this.textContent = pasteVisible ? 'Hide paste area ▴' : 'Or paste content manually ▾';
    });

    /* ── Fetch Page ── */
    document.getElementById('fetchBtn').addEventListener('click', async function() {
      var url = document.getElementById('sourceUrl').value.trim();
      if (!url) { showToast('Enter a URL to fetch.', 'error'); return; }

      var statusEl = document.getElementById('sourceStatus');
      statusEl.className = 'source-status';
      statusEl.textContent = 'Fetching...';
      document.getElementById('fetchSpinner').style.display = 'inline-block';
      this.disabled = true;

      try {
        var text = await fetchPageText(url);
        pageText = text;
        var preview = text.substring(0, 60).replace(/\n/g, ' ');
        statusEl.className = 'source-status loaded';
        statusEl.textContent = 'Page loaded: ' + preview + '...';
      } catch(err) {
        statusEl.className = 'source-status error';
        statusEl.textContent = 'Fetch failed. Try pasting the content manually.';
        pageText = '';
      }

      document.getElementById('fetchSpinner').style.display = 'none';
      this.disabled = false;
    });

    /* ── Copy ── */
    document.getElementById('copyBtn').addEventListener('click', function() {
      var text = document.getElementById('outputText').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(function() {
        document.getElementById('copyBtn').textContent = 'Copied ✓';
        document.getElementById('copyBtn').classList.add('copied');
        setTimeout(function() {
          document.getElementById('copyBtn').textContent = 'Copy';
          document.getElementById('copyBtn').classList.remove('copied');
        }, 2000);
      });
    });

    /* ── Generate ── */
    document.getElementById('generateBtn').addEventListener('click', async function() {
      var apiKey = getApiKey(GROQ_KEY);
      if (!apiKey) { showToast('Add your Groq API key first.', 'error'); return; }

      var content = pageText || document.getElementById('manualContent').value.trim();
      if (!content) { showToast('Fetch a page or paste content first.', 'error'); return; }

      var bizType = document.getElementById('bizType').value;
      var tone    = document.getElementById('tone').value;

      var isShort  = activeTab === 'short';
      var length   = isShort ? document.getElementById('shortLength').value : document.getElementById('longLength').value;
      var hookStyle= isShort ? document.getElementById('shortHook').value   : document.getElementById('longHook').value;
      var broll    = isShort ? document.getElementById('shortBroll').value  : document.getElementById('longBroll').value;
      var subs     = isShort ? document.getElementById('shortSubs').value   : document.getElementById('longSubs').value;

      var btn = document.getElementById('generateBtn');
      btn.disabled = true;
      document.getElementById('genSpinner').style.display = 'inline-block';

      document.getElementById('outputPlaceholder').style.display = 'block';
      document.getElementById('outputPlaceholder').innerHTML = '<span class="spinner"></span> Writing your script...';
      document.getElementById('outputText').style.display = 'none';
      document.getElementById('copyBtn').style.display = 'none';
      document.getElementById('feedbackRow').style.display = 'none';

      var systemPrompt, maxTok;

      if (isShort) {
        systemPrompt = 'You are a professional video scriptwriter for a white-label SEO agency. Write scripts for local service businesses and law firms. Use only facts from the page content provided. Never invent details.\n\nReturn your output in EXACTLY this format. No extra text before or after. Do not use ** or # symbols anywhere.\n\nHOOK (0-3 seconds)\n[1-2 punchy sentences. Style: ' + hookStyle + '. Must grab attention immediately.]\n\nBODY\nPoint 1: [Key benefit or fact from page]\nPoint 2: [Key benefit or fact from page]\nPoint 3: [Key benefit or fact from page - omit if it makes the script too long]\n\nCALL TO ACTION\n[Direct CTA using the actual contact method or offer from the page]\n\nB-ROLL NOTES\n[Only if Include B-roll = Yes: 3 specific scene suggestions matching the script content]\n\nSUBTITLE CUES\n[Only if Include subtitle cues = Yes: mark natural pause points with | for the editor]\n\nESTIMATED READ TIME: [X seconds]\nWORD COUNT: [X words]';
        maxTok = 800;
      } else {
        systemPrompt = 'You are a professional video scriptwriter for a white-label SEO agency. Use only facts from the page content. Never invent details.\n\nReturn in EXACTLY this format. Do not use ** or # symbols anywhere.\n\nHOOK (0-5 seconds)\n[Attention-grabbing opening - problem or fact]\n\nTHE PROBLEM\n[What the audience is dealing with - 2-3 sentences]\n\nTHE SOLUTION\n[How this business solves it - specifics from page]\n\nWHY TRUST US\n[Credentials, service area, experience, trust signals from the page]\n\nCALL TO ACTION\n[Clear, direct CTA from the page]\n\nB-ROLL NOTES\n[Only if Include B-roll = Yes: 5 specific scene suggestions]\n\nSUBTITLE CUES\n[Only if Include subtitle cues = Yes]\n\nESTIMATED READ TIME: [X minutes X seconds]\nWORD COUNT: [X words]';
        maxTok = 1200;
      }

      var userPrompt = 'Business type: ' + bizType +
        '\nTone: ' + tone +
        '\nScript length target: ' + length +
        '\nHook style: ' + hookStyle +
        '\nInclude B-roll notes: ' + broll +
        '\nInclude subtitle cues: ' + subs +
        '\n\nPAGE CONTENT:\n' + content;

      try {
        var result  = await callGroq(apiKey, systemPrompt, userPrompt, 0.4, maxTok);
        var cleaned = cleanOutput(result);

        document.getElementById('outputPlaceholder').style.display = 'none';
        document.getElementById('outputText').style.display = 'block';
        document.getElementById('outputText').textContent = cleaned;
        document.getElementById('copyBtn').style.display = 'block';
        document.getElementById('feedbackRow').style.display = 'flex';

        initFeedback(
          document.getElementById('feedbackRow').parentElement,
          'ssp_feedback',
          'Video Script Generator',
          function() { return document.getElementById('outputText').textContent; }
        );
      } catch(err) {
        document.getElementById('outputPlaceholder').style.display = 'block';
        document.getElementById('outputPlaceholder').innerHTML = '<span style="color:var(--danger);">Error: ' + err.message + '. Check your API key and try again.</span>';
      }

      btn.disabled = false;
      document.getElementById('genSpinner').style.display = 'none';
    });
  </script>
</body>
</html>
